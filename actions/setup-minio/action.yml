name: 'MinIO Action'
description: 'Setup MinIO client and set alias'
inputs:
  minio_url:
    description: 'MinIO server URL'
    required: true
  access_key:
    description: 'Access Key'
    required: true
  secret_key:
    description: 'Secret Key'
    required: true
runs:
  using: 'composite'
  steps:
    - run: |
        # Some runners already have an "mc" in PATH that is broken or is not
        # the MinIO client. Always verify the concrete binary we plan to use.
        is_minio_mc() {
          local mc_bin="${1:-mc}"

          if [ ! -x "$mc_bin" ]; then
            command -v "$mc_bin" >/dev/null 2>&1 || return 1
          fi

          "$mc_bin" --help 2>&1 | grep -qi "MinIO Client"
        }

        resolve_install_dir() {
          if [ -n "${RUNNER_TEMP:-}" ]; then
            echo "${RUNNER_TEMP}/minio-client-bin"
          elif [ -n "${GITHUB_ACTION_PATH:-}" ]; then
            echo "${GITHUB_ACTION_PATH}/.bin"
          else
            echo "/tmp/minio-client-bin"
          fi
        }

        MC_BIN="$(command -v mc || true)"

        if [ -n "$MC_BIN" ] && is_minio_mc "$MC_BIN"; then
          echo "Using existing MinIO Client: ${MC_BIN}"
        else
          if [ -n "$MC_BIN" ]; then
            echo "Existing mc is unavailable or not MinIO Client, reinstalling..."
          else
            echo "mc is not installed, downloading MinIO Client..."
          fi

          case "$(uname -m)" in
            x86_64|amd64)
              ARCH="amd64"
              ;;
            aarch64|arm64)
              ARCH="arm64"
              ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          INTERNAL_URL="https://minio.vesoft-inc.com/ci-files/mc/release/linux-${ARCH}/mc"
          PUBLIC_URL="https://dl.min.io/client/mc/release/linux-${ARCH}/mc"
          INSTALL_DIR="$(resolve_install_dir)"
          TMP_MC="$(mktemp)"
          trap 'rm -f "$TMP_MC"' EXIT

          # dl.min.io redirects to GitHub release assets, so curl must follow it.
          download_mc() {
            local url="$1"
            echo "Downloading mc from: ${url}"
            curl --fail --location --silent --show-error \
              --retry 3 --retry-delay 2 --connect-timeout 10 \
              -o "$TMP_MC" "$url"
          }

          # Fail early if the download is an HTML/XML error page instead of ELF.
          validate_mc() {
            local magic
            magic="$(head -c 4 "$TMP_MC" | od -An -t x1 | tr -d ' \n')"
            if [ "$magic" != "7f454c46" ]; then
              echo "Downloaded mc is not a valid Linux executable." >&2
              echo "Response preview:" >&2
              head -c 120 "$TMP_MC" >&2 || true
              return 1
            fi
          }

          # Self-hosted runners try the internal mirror first, then fall back.
          if [ "$RUNNER_ENVIRONMENT" = "self-hosted" ] && [ "$GITHUB_ACTIONS" = "true" ]; then
            echo "Running on self-hosted runner, trying internal download first..."
            if ! download_mc "$INTERNAL_URL" || ! validate_mc; then
              echo "Internal download failed, falling back to public URL: ${PUBLIC_URL}"
              download_mc "$PUBLIC_URL"
              validate_mc
            fi
          else
            echo "Running on GitHub-hosted runner, using public download URL: ${PUBLIC_URL}"
            download_mc "$PUBLIC_URL"
            validate_mc
          fi

          chmod +x "$TMP_MC"
          mkdir -p "$INSTALL_DIR"
          mv "$TMP_MC" "$INSTALL_DIR/mc"
          trap - EXIT

          export PATH="$INSTALL_DIR:$PATH"
          if [ -n "${GITHUB_PATH:-}" ]; then
            echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          fi
          hash -r

          MC_BIN="$INSTALL_DIR/mc"

          if ! is_minio_mc "$MC_BIN"; then
            echo "Installed mc is unavailable or not MinIO Client." >&2
            "$MC_BIN" --help 2>&1 || true
            exit 1
          fi

          echo "Installed MinIO Client: ${MC_BIN}"
        fi

        "$MC_BIN" alias set minio "${{ inputs.minio_url }}" "${{ inputs.access_key }}" "${{ inputs.secret_key }}"
      shell: bash
